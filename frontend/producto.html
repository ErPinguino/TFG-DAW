<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Detalle del juego | GameStore</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-slate-900 text-white min-h-screen">

    <!-- =========================
         NAVBAR
    ========================== -->

    <nav class="bg-slate-800 p-4">

        <div class="container mx-auto flex justify-between items-center">

            <h1 class="text-3xl font-bold text-blue-400">
                GameStore
            </h1>

            <ul class="flex gap-6 items-center">

                <li>

                    <a href="index.html"
                        class="hover:text-blue-400 transition">

                        Inicio

                    </a>

                </li>

                <li>

                    <a href="catalogo.html"
                        class="hover:text-blue-400 transition">

                        Catálogo

                    </a>

                </li>

                <li>

                    <a href="carrito.html"
                        class="hover:text-blue-400 transition">

                        Carrito

                        <span id="contadorCarrito"
                            class="bg-blue-500 text-white px-2 py-1 rounded-full text-sm ml-1">

                            0

                        </span>

                    </a>

                </li>

            </ul>

        </div>

    </nav>

    <!-- =========================
         CONTENIDO
    ========================== -->

    <section class="container mx-auto py-16 px-6">

        <div id="contenedorJuego"
            class="grid grid-cols-1 lg:grid-cols-2 gap-12 items-center">

            <!-- CARGA -->

            <div class="col-span-full text-center">

                <p class="text-3xl text-gray-400">

                    Cargando videojuego...

                </p>

            </div>

        </div>

    </section>

    <!-- =========================
         FOOTER
    ========================== -->

    <footer class="bg-slate-800 py-10 mt-20">

        <div
            class="container mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-6">

            <div>

                <h3 class="text-3xl font-bold text-blue-400 mb-2">

                    GameStore

                </h3>

                <p class="text-gray-400">

                    Tu tienda online de videojuegos.

                </p>

            </div>

            <div class="flex gap-6 text-lg">

                <a href="https://www.instagram.com"
                    target="_blank"
                    class="hover:text-blue-400 transition">

                    Instagram

                </a>

                <a href="https://x.com"
                    target="_blank"
                    class="hover:text-blue-400 transition">

                    X

                </a>

                <a href="https://www.youtube.com"
                    target="_blank"
                    class="hover:text-blue-400 transition">

                    YouTube

                </a>

            </div>

        </div>

    </footer>

    <!-- =========================
         SCRIPT
    ========================== -->

    <script>

        /* =========================
           API
        ========================== */

        const API_URL =
            "http://127.0.0.1:8000/games";

        /* =========================
           ELEMENTOS
        ========================== */

        const contenedorJuego =
            document.getElementById("contenedorJuego");

        const contadorCarrito =
            document.getElementById("contadorCarrito");

        /* =========================
           ID JUEGO
        ========================== */

        const parametros =
            new URLSearchParams(window.location.search);

        const gameId =
            parametros.get("id");

        /* =========================
           CARRITO
        ========================== */

        let carrito =
            JSON.parse(localStorage.getItem("carrito")) || [];

        contadorCarrito.textContent =
            carrito.length;

        /* =========================
           IMÁGENES
        ========================== */

        const imagenes = {

            "Cyberpunk 2077":
                "assets/images/cyberpunk.jpg",

            "Elden Ring":
                "assets/images/elden_ring.jpg",

            "GTA V":
                "assets/images/gta_v.jpg",

            "Zelda TOTK":
                "assets/images/Zelda.jpg",

            "Red Dead Redemption 2":
                "assets/images/red_dead_2.jpg",

            "Hogwarts Legacy":
                "assets/images/Hogwarts.jpg",

            "The Witcher 3":
                "assets/images/the_witcher_3.jpg",

            "Spider-Man 2":
                "assets/images/spiderman_2.jpg",

            "God of War Ragnarök":
                "assets/images/god_of_war.jpg",

            "Minecraft":
                "assets/images/Minecraft.jpg",

            "Fortnite":
                "assets/images/Fortnite.jpg",

            "Call of Duty Black Ops 6":
                "assets/images/call_of_duty.jpg",

            "Mario Kart 8 Deluxe":
                "assets/images/mario_kart_8.jpg",

            "League of Legends":
                "assets/images/league_of_legends.jpg",

            "Valorant":
                "assets/images/Valorant.jpg",

            "EA Sports FC 26":
                "assets/images/ea_sports.jpg"

        };

        /* =========================
           CARGAR JUEGO
        ========================== */

        async function cargarJuego() {

            try {

                const respuesta =
                    await fetch(`${API_URL}/${gameId}`);

                if (!respuesta.ok) {

                    throw new Error("Juego no encontrado");

                }

                const juego =
                    await respuesta.json();

                mostrarJuego(juego);

            } catch (error) {

                console.error(error);

                contenedorJuego.innerHTML = `

                    <div class="col-span-full bg-red-500 p-8 rounded-2xl text-center">

                        <h2 class="text-3xl font-bold mb-4">

                            Error

                        </h2>

                        <p>

                            No se pudo cargar el videojuego.

                        </p>

                    </div>

                `;

            }

        }

        /* =========================
           MOSTRAR JUEGO
        ========================== */

        function mostrarJuego(juego) {

            const imagen =
                imagenes[juego.title] ||
                "assets/images/default.jpg";

            const precio =
                juego.price == 0
                    ? "Gratis"
                    : juego.price.toFixed(2) + "€";

            contenedorJuego.innerHTML = `

                <!-- IMAGEN -->

                <div>

                    <img src="${imagen}"
                        class="w-full rounded-3xl shadow-2xl">

                </div>

                <!-- INFO -->

                <div>

                    <p class="text-blue-400 text-xl mb-4">

                        ${juego.genre}

                    </p>

                    <h1 class="text-6xl font-bold mb-6">

                        ${juego.title}

                    </h1>

                    <p class="text-2xl text-gray-400 mb-4">

                        Plataforma:
                        ${juego.platform}

                    </p>

                    <p class="text-2xl text-gray-400 mb-8">

                        Stock disponible:
                        ${juego.stock}

                    </p>

                    <div class="text-5xl font-bold text-blue-400 mb-10">

                        ${precio}

                    </div>

                    <button
                        onclick="agregarAlCarrito(
                            ${juego.id},
                            '${juego.title}',
                            '${juego.platform}',
                            ${juego.price}
                        )"
                        class="bg-blue-500 hover:bg-blue-600 hover:scale-105 transition transform px-10 py-5 rounded-2xl text-2xl font-bold">

                        Añadir al carrito

                    </button>

                </div>

            `;

        }

        /* =========================
           AÑADIR CARRITO
        ========================== */

        function agregarAlCarrito(id, nombre, plataforma, precio) {

            const producto = {

                id,
                nombre,
                plataforma,
                precio

            };

            carrito.push(producto);

            localStorage.setItem(
                "carrito",
                JSON.stringify(carrito)
            );

            contadorCarrito.textContent =
                carrito.length;

            alert("Juego añadido al carrito");

        }

        /* =========================
           INICIAR
        ========================== */

        cargarJuego();

    </script>

</body>

</html>

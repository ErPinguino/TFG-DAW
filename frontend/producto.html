<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Detalle del juego | GameStore</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">

</head>

<body class="min-h-screen flex flex-col">

    <!-- =========================
         NAVBAR
    ========================== -->

    <nav class="navbar">

        <div class="container-custom">

            <!-- LOGO -->

            <a href="index.html"
                class="logo">

                GameStore

            </a>

            <!-- MENÚ -->

            <ul class="nav-menu">

                <li>
                    <a href="index.html"
                        class="nav-link">
                        Inicio
                    </a>
                </li>

                <li>
                    <a href="catalogo.html"
                        class="nav-active">
                        Catálogo
                    </a>
                </li>

                <li>
                    <a href="pedidos.html"
                        class="nav-link">
                        Pedidos
                    </a>
                </li>

                <li>
                    <a href="perfil.html"
                        class="nav-link">
                        Perfil
                    </a>
                </li>

                <li>
                    <a href="carrito.html"
                        class="nav-link flex items-center gap-2">

                        Carrito

                        <span id="contadorCarrito"
                            class="cart-badge">

                            0

                        </span>

                    </a>
                </li>

            </ul>

        </div>

    </nav>

    <!-- =========================
         HERO
    ========================== -->

    <section class="hero-section-small">

        <div class="container-custom text-center">

            <span class="hero-badge">

                DETALLE DEL JUEGO

            </span>

            <h1 class="hero-title mt-6">

                Explora cada detalle

            </h1>

            <p class="hero-subtitle max-w-3xl mx-auto mt-6">

                Descubre información, plataforma, stock y añade el juego a tu colección.

            </p>

        </div>

    </section>

    <!-- =========================
         CONTENIDO
    ========================== -->

    <main class="flex-grow pb-24">

        <div class="container-custom">

            <div id="contenedorJuego"
                class="grid grid-cols-1 lg:grid-cols-2 gap-14 items-center">

                <!-- CARGA -->

                <div class="col-span-full text-center py-20">

                    <p class="text-3xl text-slate-400">

                        Cargando videojuego...

                    </p>

                </div>

            </div>

        </div>

    </main>

    <!-- =========================
         FOOTER
    ========================== -->

    <footer class="footer">

        <div class="container-custom footer-content">

            <!-- INFO -->

            <div>

                <h3 class="logo mb-3">

                    GameStore

                </h3>

                <p class="text-slate-400">

                    Tu tienda online de videojuegos.

                </p>

            </div>

            <!-- LINKS -->

            <div class="footer-links">

                <a href="https://www.instagram.com"
                    target="_blank"
                    class="footer-link">

                    Instagram

                </a>

                <a href="https://x.com"
                    target="_blank"
                    class="footer-link">

                    X

                </a>

                <a href="https://www.youtube.com"
                    target="_blank"
                    class="footer-link">

                    YouTube

                </a>

            </div>

        </div>

    </footer>

    <!-- =========================
         SCRIPT
    ========================== -->

    <script>

        /* =========================
           API
        ========================== */

        const API_URL =
            "http://127.0.0.1:8000/games";

        /* =========================
           ELEMENTOS
        ========================== */

        const contenedorJuego =
            document.getElementById("contenedorJuego");

        const contadorCarrito =
            document.getElementById("contadorCarrito");

        /* =========================
           ID JUEGO
        ========================== */

        const parametros =
            new URLSearchParams(window.location.search);

        const gameId =
            parametros.get("id");

        /* =========================
           CARRITO
        ========================== */

        let carrito =
            JSON.parse(localStorage.getItem("carrito")) || [];

        contadorCarrito.textContent =
            carrito.length;

        /* =========================
           IMÁGENES
        ========================== */

        const imagenes = {

            "Cyberpunk 2077":
                "assets/images/cyberpunk.jpg",

            "Elden Ring":
                "assets/images/elden_ring.jpg",

            "GTA V":
                "assets/images/gta_v.jpg",

            "Zelda TOTK":
                "assets/images/Zelda.jpg",

            "Red Dead Redemption 2":
                "assets/images/red_dead_2.jpg",

            "Hogwarts Legacy":
                "assets/images/Hogwarts.jpg",

            "The Witcher 3":
                "assets/images/the_witcher_3.jpg",

            "Spider-Man 2":
                "assets/images/spiderman_2.jpg",

            "God of War Ragnarök":
                "assets/images/god_of_war.jpg",

            "Minecraft":
                "assets/images/Minecraft.jpg",

            "Fortnite":
                "assets/images/Fortnite.jpg",

            "Call of Duty Black Ops 6":
                "assets/images/call_of_duty.jpg",

            "Mario Kart 8 Deluxe":
                "assets/images/mario_kart_8.jpg",

            "League of Legends":
                "assets/images/league_of_legends.jpg",

            "Valorant":
                "assets/images/Valorant.jpg",

            "EA Sports FC 26":
                "assets/images/ea_sports.jpg"

        };

        /* =========================
           CARGAR JUEGO
        ========================== */

        async function cargarJuego() {

            try {

                const respuesta =
                    await fetch(`${API_URL}/${gameId}`);

                if (!respuesta.ok) {

                    throw new Error("Juego no encontrado");

                }

                const juego =
                    await respuesta.json();

                mostrarJuego(juego);

            } catch (error) {

                console.error(error);

                contenedorJuego.innerHTML = `

                    <div class="col-span-full">

                        <div class="glass-card p-12 text-center">

                            <h2 class="text-4xl font-black mb-5">

                                Error

                            </h2>

                            <p class="text-slate-400 text-xl">

                                No se pudo cargar el videojuego.

                            </p>

                        </div>

                    </div>

                `;

            }

        }

        /* =========================
           MOSTRAR JUEGO
        ========================== */

        function mostrarJuego(juego) {

            const imagen =
                imagenes[juego.title] ||
                "assets/images/default.jpg";

            const precio =
                juego.price == 0
                    ? "Gratis"
                    : juego.price.toFixed(2) + "€";

            contenedorJuego.innerHTML = `

                <!-- IMAGEN -->

                <div class="glass-card overflow-hidden p-0">

                    <img src="${imagen}"
                        class="w-full h-full object-cover rounded-[2rem] hover:scale-105 transition duration-500">

                </div>

                <!-- INFO -->

                <div class="glass-card p-10">

                    <!-- GENERO -->

                    <span class="hero-badge">

                        ${juego.genre}

                    </span>

                    <!-- TITULO -->

                    <h1 class="text-5xl md:text-6xl font-black leading-tight mt-6 mb-8">

                        ${juego.title}

                    </h1>

                    <!-- INFO BOXES -->

                    <div class="space-y-5 mb-10">

                        <!-- PLATAFORMA -->

                        <div class="product-info-box">

                            <p class="product-info-label">

                                Plataforma

                            </p>

                            <p class="product-info-value">

                                ${juego.platform}

                            </p>

                        </div>

                        <!-- STOCK -->

                        <div class="product-info-box">

                            <p class="product-info-label">

                                Stock disponible

                            </p>

                            <p class="product-info-value">

                                ${juego.stock} unidades

                            </p>

                        </div>

                    </div>

                    <!-- PRECIO -->

                    <div class="mb-10">

                        <p class="text-slate-400 text-lg mb-2">

                            Precio

                        </p>

                        <div class="text-6xl font-black text-cyan-400">

                            ${precio}

                        </div>

                    </div>

                    <!-- BOTÓN -->

                    <button
                        onclick="agregarAlCarrito(
                            ${juego.id},
                            '${juego.title}',
                            '${juego.platform}',
                            ${juego.price}
                        )"
                        class="btn-primary w-full text-center text-2xl py-5">

                        Añadir al carrito

                    </button>

                </div>

            `;

        }

        /* =========================
           AÑADIR CARRITO
        ========================== */

        function agregarAlCarrito(id, nombre, plataforma, precio) {

            const producto = {

                id,
                nombre,
                plataforma,
                precio

            };

            carrito.push(producto);

            localStorage.setItem(
                "carrito",
                JSON.stringify(carrito)
            );

            contadorCarrito.textContent =
                carrito.length;

            alert("Juego añadido al carrito");

        }

        /* =========================
           INICIAR
        ========================== */

        cargarJuego();

    </script>

</body>

</html>

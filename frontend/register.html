<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Registro | GameStore</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">

</head>

<body class="min-h-screen flex items-center justify-center px-6 relative overflow-y-auto py-10 text-white">

    <!-- =========================
         BACKGROUND
    ========================== -->

    <div class="absolute inset-0 bg-slate-950"></div>

    <div
        class="absolute top-[-200px] left-[-150px] w-[500px] h-[500px] bg-blue-500/10 blur-[140px] rounded-full">
    </div>

    <div
        class="absolute bottom-[-200px] right-[-150px] w-[500px] h-[500px] bg-cyan-400/10 blur-[140px] rounded-full">
    </div>

    <!-- =========================
         REGISTER CARD
    ========================== -->

    <div class="relative z-10 w-full max-w-md">

        <div
            class="bg-slate-900/80 backdrop-blur-2xl border border-slate-800 rounded-[2.5rem] p-10 shadow-2xl">

            <!-- LOGO -->

            <div class="text-center mb-10">

                <h1 class="text-6xl font-black gradient-text mb-4">

                    GameStore

                </h1>

                <p class="text-slate-400 text-lg leading-relaxed">

                    Crea tu cuenta y empieza tu aventura gaming.

                </p>

            </div>

            <!-- ERROR -->

            <div id="errorBox"
                class="hidden bg-red-500/20 border border-red-500/30 text-red-300 p-4 rounded-2xl mb-6 text-center font-semibold">

            </div>

            <!-- SUCCESS -->

            <div id="successBox"
                class="hidden bg-green-500/20 border border-green-500/30 text-green-300 p-4 rounded-2xl mb-6 text-center font-semibold">

            </div>

            <!-- FORM -->

            <form id="registerForm"
                class="space-y-6">

                <!-- USERNAME -->

                <div>

                    <label
                        class="block mb-3 text-slate-300 font-semibold text-lg">

                        Nombre de usuario

                    </label>

                    <input
                        type="text"
                        id="username"
                        required
                        minlength="3"
                        maxlength="30"
                        placeholder="Tu nombre de usuario"
                        class="w-full bg-slate-800/80 border border-slate-700 rounded-2xl px-5 py-4 text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 transition">

                </div>

                <!-- EMAIL -->

                <div>

                    <label
                        class="block mb-3 text-slate-300 font-semibold text-lg">

                        Email

                    </label>

                    <input
                        type="email"
                        id="email"
                        required
                        placeholder="correo@email.com"
                        class="w-full bg-slate-800/80 border border-slate-700 rounded-2xl px-5 py-4 text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 transition">

                </div>

                <!-- PASSWORD -->

                <div>

                    <label
                        class="block mb-3 text-slate-300 font-semibold text-lg">

                        Contraseña

                    </label>

                    <input
                        type="password"
                        id="password"
                        required
                        minlength="8"
                        placeholder="Mínimo 8 caracteres"
                        class="w-full bg-slate-800/80 border border-slate-700 rounded-2xl px-5 py-4 text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 transition">

                </div>

                <!-- CONFIRM PASSWORD -->

                <div>

                    <label
                        class="block mb-3 text-slate-300 font-semibold text-lg">

                        Confirmar contraseña

                    </label>

                    <input
                        type="password"
                        id="confirmPassword"
                        required
                        minlength="8"
                        placeholder="Repite la contraseña"
                        class="w-full bg-slate-800/80 border border-slate-700 rounded-2xl px-5 py-4 text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 transition">

                </div>

                <!-- BUTTON -->

                <button
                    type="submit"
                    id="registerButton"
                    class="btn-primary w-full py-5 text-xl mt-4">

                    Crear cuenta

                </button>

            </form>

            <!-- LOGIN -->

            <div class="text-center mt-10">

                <p class="text-slate-400 mb-3">

                    ¿Ya tienes cuenta?

                </p>

                <a href="login.html"
                    class="text-blue-400 hover:text-blue-300 transition font-bold text-lg">

                    Iniciar sesión

                </a>

            </div>

            <!-- DIVIDER -->

            <div class="flex items-center gap-4 my-10">

                <div class="flex-1 h-px bg-slate-700"></div>

                <span class="text-slate-500 text-sm tracking-[0.3em] uppercase">

                    GameStore

                </span>

                <div class="flex-1 h-px bg-slate-700"></div>

            </div>

            <!-- BACK HOME -->

            <div class="text-center">

                <a href="index.html"
                    class="text-slate-400 hover:text-white transition text-lg">

                    ← Volver al inicio

                </a>

            </div>

        </div>

    </div>

    <!-- =========================
         SCRIPT
    ========================== -->

    <script>

        /* =========================
           API
        ========================== */

        const API_URL =
            "http://127.0.0.1:8000/auth/register";

        /* =========================
           ELEMENTOS
        ========================== */

        const registerForm =
            document.getElementById("registerForm");

        const errorBox =
            document.getElementById("errorBox");

        const successBox =
            document.getElementById("successBox");

        const registerButton =
            document.getElementById("registerButton");

        /* =========================
           REDIRECT SI YA LOGIN
        ========================== */

        const token =
            localStorage.getItem("token");

        if (token) {

            window.location.href =
                "catalogo.html";

        }

        /* =========================
           HELPERS
        ========================== */

        function mostrarError(mensaje) {

            errorBox.textContent =
                mensaje;

            errorBox.classList.remove("hidden");

        }

        function ocultarMensajes() {

            errorBox.classList.add("hidden");

            successBox.classList.add("hidden");

        }

        /* =========================
           REGISTER
        ========================== */

        registerForm.addEventListener("submit", async (e) => {

            e.preventDefault();

            ocultarMensajes();

            registerButton.disabled = true;

            registerButton.textContent =
                "Creando cuenta...";

            const username =
                document.getElementById("username")
                    .value
                    .trim();

            const email =
                document.getElementById("email")
                    .value
                    .trim();

            const password =
                document.getElementById("password")
                    .value;

            const confirmPassword =
                document.getElementById("confirmPassword")
                    .value;

            /* =========================
               VALIDACIONES
            ========================== */

            if (password !== confirmPassword) {

                mostrarError(
                    "Las contraseñas no coinciden"
                );

                registerButton.disabled = false;

                registerButton.textContent =
                    "Crear cuenta";

                return;

            }

            if (password.length < 8) {

                mostrarError(
                    "La contraseña debe tener al menos 8 caracteres"
                );

                registerButton.disabled = false;

                registerButton.textContent =
                    "Crear cuenta";

                return;

            }

            try {

                const respuesta =
                    await fetch(API_URL, {

                        method: "POST",

                        headers: {

                            "Content-Type":
                                "application/json"

                        },

                        body: JSON.stringify({

                            username,
                            email,
                            password

                        })

                    });

                const data =
                    await respuesta.json();

                /* =========================
                   ERROR
                ========================== */

                if (!respuesta.ok) {

                    throw new Error(
                        data.detail ||
                        "Error al crear cuenta"
                    );

                }

                /* =========================
                   SUCCESS
                ========================== */

                successBox.textContent =
                    "Cuenta creada correctamente";

                successBox.classList.remove("hidden");

                registerForm.reset();

                setTimeout(() => {

                    window.location.href =
                        "login.html";

                }, 1800);

            } catch (error) {

                console.error(error);

                mostrarError(error.message);

            } finally {

                registerButton.disabled = false;

                registerButton.textContent =
                    "Crear cuenta";

            }

        });

    </script>

</body>

</html>

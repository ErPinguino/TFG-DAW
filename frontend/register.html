<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Registro | GameStore</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-slate-950 text-white min-h-screen flex items-center justify-center px-6 relative overflow-hidden">

    <!-- =========================
         FONDO
    ========================== -->

    <div class="absolute inset-0 bg-gradient-to-br from-blue-900/20 via-slate-950 to-purple-900/20"></div>

    <div class="absolute top-0 left-0 w-96 h-96 bg-blue-500/10 blur-3xl rounded-full"></div>

    <div class="absolute bottom-0 right-0 w-96 h-96 bg-purple-500/10 blur-3xl rounded-full"></div>

    <!-- =========================
         REGISTER CARD
    ========================== -->

    <div class="relative z-10 w-full max-w-md">

        <div class="bg-slate-900/90 backdrop-blur-xl border border-slate-800 p-10 rounded-[2rem] shadow-2xl">

            <!-- LOGO -->

            <div class="text-center mb-10">

                <h1 class="text-5xl font-black mb-4 bg-gradient-to-r from-blue-400 to-cyan-300 bg-clip-text text-transparent">

                    GameStore

                </h1>

                <p class="text-slate-400 text-lg">

                    Crea tu cuenta y empieza a jugar

                </p>

            </div>

            <!-- ERROR -->

            <div id="errorBox"
                class="hidden bg-red-500/20 border border-red-500/30 text-red-300 p-4 rounded-2xl mb-6 text-center">

            </div>

            <!-- SUCCESS -->

            <div id="successBox"
                class="hidden bg-green-500/20 border border-green-500/30 text-green-300 p-4 rounded-2xl mb-6 text-center">

            </div>

            <!-- FORM -->

            <form id="registerForm"
                class="space-y-6">

                <!-- USERNAME -->

                <div>

                    <label class="block mb-3 text-slate-300 font-semibold">

                        Nombre de usuario

                    </label>

                    <input
                        type="text"
                        id="username"
                        required
                        minlength="3"
                        placeholder="Tu nombre de usuario"
                        class="w-full p-4 rounded-2xl bg-slate-800 border border-slate-700 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition">

                </div>

                <!-- EMAIL -->

                <div>

                    <label class="block mb-3 text-slate-300 font-semibold">

                        Email

                    </label>

                    <input
                        type="email"
                        id="email"
                        required
                        placeholder="correo@email.com"
                        class="w-full p-4 rounded-2xl bg-slate-800 border border-slate-700 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition">

                </div>

                <!-- PASSWORD -->

                <div>

                    <label class="block mb-3 text-slate-300 font-semibold">

                        Contraseña

                    </label>

                    <input
                        type="password"
                        id="password"
                        required
                        minlength="8"
                        placeholder="Mínimo 8 caracteres"
                        class="w-full p-4 rounded-2xl bg-slate-800 border border-slate-700 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition">

                </div>

                <!-- BUTTON -->

                <button
                    type="submit"
                    id="registerButton"
                    class="w-full bg-gradient-to-r from-blue-500 to-cyan-400 hover:scale-[1.02] transition transform py-4 rounded-2xl text-xl font-bold shadow-lg shadow-blue-500/20">

                    Crear cuenta

                </button>

            </form>

            <!-- LOGIN -->

            <div class="text-center mt-8">

                <p class="text-slate-400 mb-2">

                    ¿Ya tienes cuenta?

                </p>

                <a href="login.html"
                    class="text-blue-400 hover:text-blue-300 transition font-semibold">

                    Iniciar sesión

                </a>

            </div>

            <!-- DIVIDER -->

            <div class="flex items-center gap-4 my-8">

                <div class="flex-1 h-px bg-slate-700"></div>

                <span class="text-slate-500 text-sm">

                    GAMESTORE

                </span>

                <div class="flex-1 h-px bg-slate-700"></div>

            </div>

            <!-- HOME -->

            <div class="text-center">

                <a href="index.html"
                    class="text-slate-400 hover:text-white transition">

                    ← Volver al inicio

                </a>

            </div>

        </div>

    </div>

    <!-- =========================
         SCRIPT
    ========================== -->

    <script>

        /* =========================
           API
        ========================== */

        const API_URL =
            "http://127.0.0.1:8000/auth/register";

        /* =========================
           ELEMENTOS
        ========================== */

        const registerForm =
            document.getElementById("registerForm");

        const errorBox =
            document.getElementById("errorBox");

        const successBox =
            document.getElementById("successBox");

        const registerButton =
            document.getElementById("registerButton");

        /* =========================
           REGISTER
        ========================== */

        registerForm.addEventListener("submit", async (e) => {

            e.preventDefault();

            errorBox.classList.add("hidden");

            successBox.classList.add("hidden");

            registerButton.disabled = true;

            registerButton.textContent =
                "Creando cuenta...";

            const username =
                document.getElementById("username").value;

            const email =
                document.getElementById("email").value;

            const password =
                document.getElementById("password").value;

            try {

                const respuesta =
                    await fetch(API_URL, {

                        method: "POST",

                        headers: {
                            "Content-Type":
                                "application/json"
                        },

                        body: JSON.stringify({

                            username,
                            email,
                            password

                        })

                    });

                const data =
                    await respuesta.json();

                if (!respuesta.ok) {

                    throw new Error(
                        data.detail ||
                        "Error al crear cuenta"
                    );

                }

                successBox.textContent =
                    "Cuenta creada correctamente";

                successBox.classList.remove("hidden");

                registerForm.reset();

                setTimeout(() => {

                    window.location.href =
                        "login.html";

                }, 2000);

            } catch (error) {

                console.error(error);

                errorBox.textContent =
                    error.message;

                errorBox.classList.remove("hidden");

            } finally {

                registerButton.disabled = false;

                registerButton.textContent =
                    "Crear cuenta";

            }

        });

    </script>

</body>

</html>

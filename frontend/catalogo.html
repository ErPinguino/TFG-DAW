<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8" />

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0" />

    <title>Catálogo | GameStore</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <!-- =========================
         NAVBAR
    ========================== -->

    <nav class="navbar">

        <div class="container-custom navbar-container">

            <!-- LOGO -->

            <a href="index.html"
                class="logo">

                GameStore

            </a>

            <!-- MENU -->

            <ul class="nav-menu">

                <li>

                    <a href="index.html"
                        class="nav-link">

                        Inicio

                    </a>

                </li>

                <li>

                    <a href="catalogo.html"
                        class="nav-active">

                        Catálogo

                    </a>

                </li>

                <li>

                    <a href="pedidos.html"
                        class="nav-link">

                        Pedidos

                    </a>

                </li>

                <li>

                    <a href="perfil.html"
                        class="nav-link">

                        Perfil

                    </a>

                </li>

                <li>

                    <a href="carrito.html"
                        class="nav-link cart-link">

                        Carrito

                        <span id="contadorCarrito"
                            class="cart-badge">

                            0

                        </span>

                    </a>

                </li>

            </ul>

        </div>

    </nav>

    <!-- =========================
         HERO
    ========================== -->

    <section class="hero-section">

        <div class="container-custom">

            <h1 class="hero-title">

                Explora el mejor

                <span class="gradient-text">

                    catálogo gaming

                </span>

            </h1>

            <p class="hero-subtitle">

                Descubre los títulos más vendidos,
                lanzamientos recientes y experiencias épicas
                para todas las plataformas.

            </p>

        </div>

    </section>

    <!-- =========================
         BUSCADOR
    ========================== -->

    <section class="container-custom mb-10">

        <div class="max-w-4xl mx-auto">

            <input type="text"
                id="buscador"
                placeholder="Buscar videojuegos..."
                class="w-full bg-slate-900/70 border border-slate-700 focus:border-blue-500 rounded-2xl p-5 text-lg outline-none transition shadow-2xl">

        </div>

    </section>

    <!-- =========================
         FILTROS
    ========================== -->

    <section class="container-custom mb-16">

        <div class="flex flex-wrap justify-center gap-4">

            <button class="filtro btn-primary"
                data-filtro="todos">

                Todos

            </button>

            <button class="filtro filtro-secundario"
                data-filtro="PlayStation 5">

                PlayStation 5

            </button>

            <button class="filtro filtro-secundario"
                data-filtro="PC">

                PC

            </button>

            <button class="filtro filtro-secundario"
                data-filtro="Nintendo Switch">

                Nintendo Switch

            </button>

            <button class="filtro filtro-secundario"
                data-filtro="Xbox">

                Xbox

            </button>

            <button class="filtro filtro-secundario"
                data-filtro="Multiplataforma">

                Multiplataforma

            </button>

        </div>

    </section>

    <!-- =========================
         GRID JUEGOS
    ========================== -->

    <section class="container-custom pb-24">

        <div id="gridJuegos"
            class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-10">

        </div>

    </section>

    <!-- =========================
         FOOTER
    ========================== -->

    <footer class="py-12">

        <div
            class="container-custom flex flex-col md:flex-row justify-between items-center gap-8">

            <div>

                <h3 class="logo mb-3">

                    GameStore

                </h3>

                <p class="text-slate-400">

                    Tu tienda online de videojuegos.

                </p>

            </div>

            <div class="flex gap-8 text-lg">

                <a href="https://www.instagram.com"
                    target="_blank"
                    class="footer-link">

                    Instagram

                </a>

                <a href="https://x.com"
                    target="_blank"
                    class="footer-link">

                    X

                </a>

                <a href="https://www.youtube.com"
                    target="_blank"
                    class="footer-link">

                    YouTube

                </a>

            </div>

        </div>

    </footer>

    <!-- =========================
         SCRIPT
    ========================== -->

    <script>

        const API_URL =
            "http://127.0.0.1:8000/games";

        const gridJuegos =
            document.getElementById("gridJuegos");

        const buscador =
            document.getElementById("buscador");

        const contadorCarrito =
            document.getElementById("contadorCarrito");

        const botonesFiltro =
            document.querySelectorAll(".filtro");

        let carrito =
            JSON.parse(localStorage.getItem("carrito")) || [];

        contadorCarrito.textContent =
            carrito.length;

        const imagenes = {

            "Cyberpunk 2077":
                "assets/images/cyberpunk.jpg",

            "Elden Ring":
                "assets/images/elden_ring.jpg",

            "GTA V":
                "assets/images/gta_v.jpg",

            "Zelda TOTK":
                "assets/images/Zelda.jpg",

            "Red Dead Redemption 2":
                "assets/images/red_dead_2.jpg",

            "Hogwarts Legacy":
                "assets/images/Hogwarts.jpg",

            "The Witcher 3":
                "assets/images/the_witcher_3.jpg",

            "Spider-Man 2":
                "assets/images/spiderman_2.jpg",

            "God of War Ragnarök":
                "assets/images/god_of_war.jpg",

            "Minecraft":
                "assets/images/Minecraft.jpg",

            "Fortnite":
                "assets/images/Fortnite.jpg",

            "Call of Duty Black Ops 6":
                "assets/images/call_of_duty.jpg",

            "Mario Kart 8 Deluxe":
                "assets/images/mario_kart_8.jpg",

            "League of Legends":
                "assets/images/league_of_legends.jpg",

            "Valorant":
                "assets/images/Valorant.jpg",

            "EA Sports FC 26":
                "assets/images/ea_sports.jpg"

        };

        let juegosOriginales = [];

        let filtroActual = "todos";

        async function cargarJuegos() {

            try {

                const respuesta =
                    await fetch(API_URL);

                const juegos =
                    await respuesta.json();

                juegosOriginales = juegos;

                mostrarJuegos(juegos);

            } catch (error) {

                console.error(error);

                gridJuegos.innerHTML = `

                    <div class="col-span-full bg-red-500 text-white p-6 rounded-2xl text-center">

                        Error al cargar los videojuegos.

                    </div>

                `;

            }

        }

        function mostrarJuegos(juegos) {

            gridJuegos.innerHTML = "";

            if (juegos.length === 0) {

                gridJuegos.innerHTML = `

                    <div class="col-span-full game-card p-12 text-center">

                        <p class="text-3xl text-slate-300 font-bold">

                            No se encontraron videojuegos.

                        </p>

                    </div>

                `;

                return;

            }

            juegos.forEach(juego => {

                const imagen =
                    imagenes[juego.title] ||
                    "assets/images/default.jpg";

                const precio =
                    juego.price == 0
                        ? "Gratis"
                        : juego.price.toFixed(2) + "€";

                gridJuegos.innerHTML += `

                    <div class="game-card overflow-hidden flex flex-col">

                        <!-- IMAGEN -->

                        <div class="overflow-hidden">

                            <img src="${imagen}"
                                class="w-full h-72 object-cover hover:scale-110 transition duration-500">

                        </div>

                        <!-- INFO -->

                        <div class="p-7 flex flex-col flex-grow">

                            <div class="mb-5">

                                <h2 class="text-3xl font-black mb-3">

                                    ${juego.title}

                                </h2>

                                <p class="text-slate-400 mb-2">

                                    ${juego.platform}

                                </p>

                                <p class="text-slate-500">

                                    ${juego.genre}

                                </p>

                            </div>

                            <div class="mt-auto">

                                <div class="flex justify-between items-center mb-6">

                                    <span class="text-blue-400 text-4xl font-black">

                                        ${precio}

                                    </span>

                                    <span class="text-sm text-slate-400">

                                        Stock: ${juego.stock}

                                    </span>

                                </div>

                                <a href="producto.html?id=${juego.id}"
                                    class="btn-primary w-full">

                                    Ver videojuego

                                </a>

                            </div>

                        </div>

                    </div>

                `;

            });

        }

        buscador.addEventListener("keyup", () => {

            aplicarFiltros();

        });

        botonesFiltro.forEach(boton => {

            boton.addEventListener("click", () => {

                botonesFiltro.forEach(btn => {

                    btn.classList.remove("btn-primary");

                    btn.classList.add("filtro-secundario");

                });

                boton.classList.remove("filtro-secundario");

                boton.classList.add("btn-primary");

                filtroActual =
                    boton.dataset.filtro;

                aplicarFiltros();

            });

        });

        function aplicarFiltros() {

            const texto =
                buscador.value.toLowerCase();

            let juegosFiltrados =
                juegosOriginales.filter(juego => {

                    const coincideBusqueda =
                        juego.title.toLowerCase().includes(texto);

                    const coincideFiltro =

                        filtroActual === "todos" ||

                        juego.platform === filtroActual;

                    return coincideBusqueda && coincideFiltro;

                });

            mostrarJuegos(juegosFiltrados);

        }

        cargarJuegos();

    </script>

</body>

</html>

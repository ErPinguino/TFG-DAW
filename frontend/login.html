<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Login | GameStore</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">

</head>

<body class="min-h-screen flex items-center justify-center px-6 relative overflow-y-auto py-10 text-white">

    <!-- =========================
         BACKGROUND
    ========================== -->

    <div class="absolute inset-0 bg-slate-950"></div>

    <div
        class="absolute top-[-200px] left-[-150px] w-[500px] h-[500px] bg-blue-500/10 blur-[140px] rounded-full">
    </div>

    <div
        class="absolute bottom-[-200px] right-[-150px] w-[500px] h-[500px] bg-cyan-400/10 blur-[140px] rounded-full">
    </div>

    <!-- =========================
         LOGIN CARD
    ========================== -->

    <div class="relative z-10 w-full max-w-md">

        <div
            class="bg-slate-900/80 backdrop-blur-2xl border border-slate-800 rounded-[2.5rem] p-10 shadow-2xl">

            <!-- LOGO -->

            <div class="text-center mb-10">

                <h1 class="text-6xl font-black gradient-text mb-4">

                    GameStore

                </h1>

                <p class="text-slate-400 text-lg leading-relaxed">

                    Inicia sesión y continúa tu aventura gaming.

                </p>

            </div>

            <!-- ERROR -->

            <div id="errorBox"
                class="hidden bg-red-500/20 border border-red-500/30 text-red-300 p-4 rounded-2xl mb-6 text-center font-semibold">

            </div>

            <!-- FORM -->

            <form id="loginForm"
                class="space-y-6">

                <!-- USERNAME -->

                <div>

                    <label
                        class="block mb-3 text-slate-300 font-semibold text-lg">

                        Usuario o email

                    </label>

                    <input
                        type="text"
                        id="username"
                        required
                        placeholder="Introduce tu usuario"
                        class="w-full bg-slate-800/80 border border-slate-700 rounded-2xl px-5 py-4 text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 transition">

                </div>

                <!-- PASSWORD -->

                <div>

                    <label
                        class="block mb-3 text-slate-300 font-semibold text-lg">

                        Contraseña

                    </label>

                    <input
                        type="password"
                        id="password"
                        required
                        placeholder="••••••••"
                        class="w-full bg-slate-800/80 border border-slate-700 rounded-2xl px-5 py-4 text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 transition">

                </div>

                <!-- BUTTON -->

                <button
                    type="submit"
                    id="loginButton"
                    class="btn-primary w-full py-5 text-xl mt-4">

                    Iniciar sesión

                </button>

            </form>

            <!-- REGISTER -->

            <div class="text-center mt-10">

                <p class="text-slate-400 mb-3">

                    ¿No tienes cuenta?

                </p>

                <a href="register.html"
                    class="text-blue-400 hover:text-blue-300 transition font-bold text-lg">

                    Crear cuenta

                </a>

            </div>

            <!-- DIVIDER -->

            <div class="flex items-center gap-4 my-10">

                <div class="flex-1 h-px bg-slate-700"></div>

                <span class="text-slate-500 text-sm tracking-[0.3em] uppercase">

                    GameStore

                </span>

                <div class="flex-1 h-px bg-slate-700"></div>

            </div>

            <!-- BACK HOME -->

            <div class="text-center">

                <a href="index.html"
                    class="text-slate-400 hover:text-white transition text-lg">

                    ← Volver al inicio

                </a>

            </div>

        </div>

    </div>

    <!-- =========================
         SCRIPT
    ========================== -->

    <script>

        /* =========================
           API
        ========================== */

        const API_URL =
            "http://127.0.0.1:8000/auth/login";

        /* =========================
           ELEMENTOS
        ========================== */

        const loginForm =
            document.getElementById("loginForm");

        const errorBox =
            document.getElementById("errorBox");

        const loginButton =
            document.getElementById("loginButton");

        /* =========================
           LOGIN
        ========================== */

        loginForm.addEventListener("submit", async (e) => {

            e.preventDefault();

            errorBox.classList.add("hidden");

            loginButton.disabled = true;

            loginButton.textContent =
                "Iniciando sesión...";

            const username =
                document.getElementById("username").value;

            const password =
                document.getElementById("password").value;

            try {

                const formData =
                    new URLSearchParams();

                formData.append("username", username);

                formData.append("password", password);

                const respuesta =
                    await fetch(API_URL, {

                        method: "POST",

                        headers: {
                            "Content-Type":
                                "application/x-www-form-urlencoded"
                        },

                        body: formData

                    });

                const data =
                    await respuesta.json();

                if (!respuesta.ok) {

                    throw new Error(
                        data.detail ||
                        "Error al iniciar sesión"
                    );

                }

                localStorage.setItem(
                    "token",
                    data.access_token
                );

                window.location.href =
                    "catalogo.html";

            } catch (error) {

                console.error(error);

                errorBox.textContent =
                    error.message;

                errorBox.classList.remove("hidden");

            } finally {

                loginButton.disabled = false;

                loginButton.textContent =
                    "Iniciar sesión";

            }

        });

    </script>

</body>

</html>

<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Checkout | GameStore</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-slate-900 text-white min-h-screen flex flex-col">

    <!-- =========================
         NAVBAR
    ========================== -->

    <nav class="bg-slate-800 p-4 shadow-xl">

        <div class="container mx-auto flex justify-between items-center">

            <h1 class="text-3xl font-bold text-blue-400">

                GameStore

            </h1>

            <ul class="flex gap-6 items-center">

                <li>

                    <a href="index.html"
                        class="hover:text-blue-400 transition">

                        Inicio

                    </a>

                </li>

                <li>

                    <a href="catalogo.html"
                        class="hover:text-blue-400 transition">

                        Catálogo

                    </a>

                </li>

                <li>

                    <a href="carrito.html"
                        class="hover:text-blue-400 transition">

                        Carrito

                    </a>

                </li>

            </ul>

        </div>

    </nav>

    <!-- =========================
         HEADER
    ========================== -->

    <section class="py-16 text-center px-6">

        <h1 class="text-6xl font-bold mb-6">

            Finalizar compra

        </h1>

        <p class="text-gray-400 text-xl">

            Completa tu pedido de forma segura.

        </p>

    </section>

    <!-- =========================
         CONTENIDO
    ========================== -->

    <main class="container mx-auto px-6 pb-20 flex-grow">

        <!-- RESUMEN -->

        <div class="bg-slate-800 rounded-3xl p-10 max-w-4xl mx-auto">

            <h2 class="text-4xl font-bold mb-8">

                Resumen del pedido

            </h2>

            <!-- MENSAJE -->

            <div id="mensaje"
                class="hidden mb-6 p-4 rounded-xl text-center font-bold">

            </div>

            <!-- JUEGOS -->

            <div id="listaCheckout"
                class="space-y-6 mb-10">

            </div>

            <!-- TOTAL -->

            <div
                class="flex justify-between items-center border-t border-slate-700 pt-6 mb-10">

                <span class="text-3xl font-bold">

                    Total

                </span>

                <span id="totalCheckout"
                    class="text-4xl font-bold text-blue-400">

                    0€

                </span>

            </div>

            <!-- BOTÓN -->

            <button
                id="checkoutButton"
                onclick="realizarCheckout()"
                class="w-full bg-blue-500 hover:bg-blue-600 transition py-5 rounded-2xl text-2xl font-bold">

                Confirmar compra

            </button>

        </div>

    </main>

    <!-- =========================
         FOOTER
    ========================== -->

    <footer class="bg-slate-800 py-10">

        <div
            class="container mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-6">

            <div>

                <h3 class="text-3xl font-bold text-blue-400 mb-2">

                    GameStore

                </h3>

                <p class="text-gray-400">

                    Tu tienda online de videojuegos.

                </p>

            </div>

            <div class="flex gap-6 text-lg">

                <a href="https://www.instagram.com"
                    target="_blank"
                    class="hover:text-blue-400 transition">

                    Instagram

                </a>

                <a href="https://x.com"
                    target="_blank"
                    class="hover:text-blue-400 transition">

                    X

                </a>

                <a href="https://www.youtube.com"
                    target="_blank"
                    class="hover:text-blue-400 transition">

                    YouTube

                </a>

            </div>

        </div>

    </footer>

    <!-- =========================
         SCRIPT
    ========================== -->

    <script>

        /* =========================
           API
        ========================== */

        const API_URL =
            "http://127.0.0.1:8000/orders/checkout";

        /* =========================
           ELEMENTOS
        ========================== */

        const listaCheckout =
            document.getElementById("listaCheckout");

        const totalCheckout =
            document.getElementById("totalCheckout");

        const mensaje =
            document.getElementById("mensaje");

        const checkoutButton =
            document.getElementById("checkoutButton");

        /* =========================
           TOKEN
        ========================== */

        const token =
            localStorage.getItem("token");

        /* =========================
           CARRITO
        ========================== */

        let carrito =
            JSON.parse(localStorage.getItem("carrito")) || [];

        /* =========================
           VALIDAR LOGIN
        ========================== */

        if (!token) {

            alert("Debes iniciar sesión");

            window.location.href =
                "login.html";

        }

        /* =========================
           MOSTRAR CARRITO
        ========================== */

        function mostrarCheckout() {

            listaCheckout.innerHTML = "";

            if (carrito.length === 0) {

                listaCheckout.innerHTML = `

                    <div class="bg-red-500 p-6 rounded-2xl text-center">

                        El carrito está vacío.

                    </div>

                `;

                checkoutButton.disabled = true;

                return;

            }

            let total = 0;

            carrito.forEach(juego => {

                total += juego.precio;

                listaCheckout.innerHTML += `

                    <div class="bg-slate-700 p-6 rounded-2xl flex justify-between items-center">

                        <div>

                            <h3 class="text-2xl font-bold">

                                ${juego.nombre}

                            </h3>

                            <p class="text-gray-400">

                                ${juego.plataforma}

                            </p>

                        </div>

                        <span class="text-2xl text-blue-400 font-bold">

                            ${juego.precio.toFixed(2)}€

                        </span>

                    </div>

                `;

            });

            totalCheckout.textContent =
                total.toFixed(2) + "€";

        }

        /* =========================
           CHECKOUT
        ========================== */

        async function realizarCheckout() {

            try {

                checkoutButton.disabled = true;

                checkoutButton.textContent =
                    "Procesando compra...";

                const respuesta =
                    await fetch(API_URL, {

                        method: "POST",

                        headers: {

                            "Authorization":
                                `Bearer ${token}`

                        }

                    });

                const data =
                    await respuesta.json();

                /* =========================
                   ERROR
                ========================== */

                if (!respuesta.ok) {

                    throw new Error(
                        data.detail ||
                        "Error al procesar compra"
                    );

                }

                /* =========================
                   SUCCESS
                ========================== */

                mensaje.className =
                    "bg-green-500 mb-6 p-4 rounded-xl text-center font-bold";

                mensaje.textContent =
                    "Compra realizada correctamente";

                mensaje.classList.remove("hidden");

                /* =========================
                   LIMPIAR CARRITO
                ========================== */

                localStorage.removeItem("carrito");

                carrito = [];

                mostrarCheckout();

                /* =========================
                   REDIRECT
                ========================== */

                setTimeout(() => {

                    window.location.href =
                        "catalogo.html";

                }, 2500);

            } catch (error) {

                console.error(error);

                mensaje.className =
                    "bg-red-500 mb-6 p-4 rounded-xl text-center font-bold";

                mensaje.textContent =
                    error.message;

                mensaje.classList.remove("hidden");

            } finally {

                checkoutButton.disabled = false;

                checkoutButton.textContent =
                    "Confirmar compra";

            }

        }

        /* =========================
           INICIAR
        ========================== */

        mostrarCheckout();

    </script>

</body>

</html>

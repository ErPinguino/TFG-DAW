<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Checkout | GameStore</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">

</head>

<body class="min-h-screen flex flex-col text-white">

    <!-- NAVBAR -->

    <nav class="navbar">

        <div class="container-custom">

            <a href="index.html"
                class="logo">

                GameStore

            </a>

            <ul class="nav-menu">

                <li>
                    <a href="index.html"
                        class="nav-link">
                        Inicio
                    </a>
                </li>

                <li>
                    <a href="catalogo.html"
                        class="nav-link">
                        Catálogo
                    </a>
                </li>

                <li>
                    <a href="pedidos.html"
                        class="nav-link">
                        Pedidos
                    </a>
                </li>

                <li>
                    <a href="perfil.html"
                        class="nav-link">
                        Perfil
                    </a>
                </li>

                <li>
                    <a href="carrito.html"
                        class="nav-link">

                        Carrito

                        <span id="contadorCarrito"
                            class="cart-badge">

                            0

                        </span>

                    </a>
                </li>

            </ul>

        </div>

    </nav>

    <!-- HERO -->

    <section class="hero-section-small">

        <div class="container-custom text-center">

            <span class="hero-badge">

                CHECKOUT

            </span>

            <h1 class="hero-title mt-6">

                Finaliza tu pedido

            </h1>

            <p class="hero-subtitle max-w-3xl mx-auto mt-6">

                Revisa tus videojuegos y confirma la compra para añadirlos a tu colección.

            </p>

        </div>

    </section>

    <!-- CONTENIDO -->

    <main class="flex-grow pb-24">

        <div class="container-custom">

            <div class="max-w-5xl mx-auto">

                <div class="game-card p-8 md:p-12">

                    <!-- MENSAJE -->

                    <div id="mensaje"
                        class="hidden mb-8 p-5 rounded-2xl text-center font-bold text-xl">

                    </div>

                    <!-- LISTA -->

                    <div id="listaCheckout"
                        class="space-y-6 mb-10">

                    </div>

                    <!-- PASARELA DE PAGO -->

                    <div class="bg-slate-900/70 border border-white/10 rounded-3xl p-8 mb-10">

                        <h2 class="text-3xl font-black mb-8">

                            Datos de pago

                        </h2>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

                            <!-- TITULAR -->

                            <div>

                                <label class="block mb-3 text-slate-300 font-bold">

                                    Titular de la tarjeta

                                </label>

                                <input
                                    type="text"
                                    id="titular"
                                    placeholder="Nombre Apellido"
                                    class="w-full bg-slate-950 border border-slate-700 rounded-2xl px-5 py-4 text-white outline-none">

                            </div>

                            <!-- TARJETA -->

                            <div>

                                <label class="block mb-3 text-slate-300 font-bold">

                                    Número de tarjeta

                                </label>

                                <input
                                    type="text"
                                    id="tarjeta"
                                    maxlength="19"
                                    placeholder="1234 5678 9012 3456"
                                    class="w-full bg-slate-950 border border-slate-700 rounded-2xl px-5 py-4 text-white outline-none">

                            </div>

                            <!-- FECHA -->

                            <div>

                                <label class="block mb-3 text-slate-300 font-bold">

                                    Fecha de expiración

                                </label>

                                <input
                                    type="text"
                                    id="fecha"
                                    maxlength="5"
                                    placeholder="12/28"
                                    class="w-full bg-slate-950 border border-slate-700 rounded-2xl px-5 py-4 text-white outline-none">

                            </div>

                            <!-- CVV -->

                            <div>

                                <label class="block mb-3 text-slate-300 font-bold">

                                    CVV

                                </label>

                                <input
                                    type="password"
                                    id="cvv"
                                    maxlength="4"
                                    placeholder="123"
                                    class="w-full bg-slate-950 border border-slate-700 rounded-2xl px-5 py-4 text-white outline-none">

                            </div>

                        </div>

                    </div>

                    <!-- TOTAL -->

                    <div
                        class="border-t border-slate-700 pt-8 flex flex-col md:flex-row justify-between items-center gap-6">

                        <div>

                            <p class="text-slate-400 text-lg mb-2">

                                Total del pedido

                            </p>

                            <h2 id="totalCheckout"
                                class="text-5xl font-black text-cyan-400">

                                0€

                            </h2>

                        </div>

                        <button
                            id="checkoutButton"
                            onclick="realizarCheckout()"
                            class="btn-primary text-2xl px-10 py-5">

                            Confirmar compra

                        </button>

                    </div>

                </div>

            </div>

        </div>

    </main>

    <!-- FOOTER -->

    <footer class="py-12">

        <div class="container-custom flex flex-col md:flex-row justify-between items-center gap-8">

            <div>

                <h3 class="logo mb-3">

                    GameStore

                </h3>

                <p class="text-slate-400">

                    Tu tienda online de videojuegos.

                </p>

            </div>

        </div>

    </footer>

    <!-- SCRIPT -->

    <script>

        const API_CART =
            "http://127.0.0.1:8000/cart/";

        const API_CHECKOUT =
            "http://127.0.0.1:8000/orders/checkout";

        const listaCheckout =
            document.getElementById("listaCheckout");

        const totalCheckout =
            document.getElementById("totalCheckout");

        const mensaje =
            document.getElementById("mensaje");

        const checkoutButton =
            document.getElementById("checkoutButton");

        const contadorCarrito =
            document.getElementById("contadorCarrito");

        const token =
            localStorage.getItem("token");

        let carrito = [];

        if (!token) {

            alert("Debes iniciar sesión");

            window.location.href =
                "login.html";

        }

        async function cargarCarrito() {

            try {

                const respuesta =
                    await fetch(API_CART, {

                        headers: {

                            "Authorization":
                                `Bearer ${token}`

                        }

                    });

                const data =
                    await respuesta.json();

                if (!respuesta.ok) {

                    throw new Error(
                        data.detail ||
                        "Error al cargar carrito"
                    );

                }

                carrito = data.items || [];

                contadorCarrito.textContent =
                    carrito.length;

                mostrarCheckout(data.total_price || 0);

            } catch (error) {

                console.error(error);

                listaCheckout.innerHTML = `

                    <div class="text-center py-12">

                        <h2 class="text-4xl font-black mb-6 text-red-400">

                            Error al cargar carrito

                        </h2>

                    </div>

                `;

            }

        }

        function mostrarCheckout(totalBackend) {

            listaCheckout.innerHTML = "";

            if (carrito.length === 0) {

                listaCheckout.innerHTML = `

                    <div class="text-center py-12">

                        <h2 class="text-5xl font-black mb-6">

                            El carrito está vacío

                        </h2>

                    </div>

                `;

                totalCheckout.textContent = "0€";

                checkoutButton.disabled = true;

                return;

            }

            checkoutButton.disabled = false;

            carrito.forEach(item => {

                const juego = item.game;

                listaCheckout.innerHTML += `

                    <div class="bg-slate-900/70 border border-white/5 rounded-3xl p-6 flex justify-between items-center">

                        <div>

                            <h3 class="text-3xl font-black mb-2">

                                ${juego.title}

                            </h3>

                            <p class="text-slate-400 text-lg">

                                🎮 ${juego.platform}

                            </p>

                            <p class="text-slate-500">

                                Cantidad: ${item.quantity}

                            </p>

                        </div>

                        <span class="text-4xl font-black text-cyan-400">

                            ${(juego.price * item.quantity).toFixed(2)}€

                        </span>

                    </div>

                `;

            });

            totalCheckout.textContent =
                totalBackend.toFixed(2) + "€";

        }

        async function realizarCheckout() {

            const titular =
                document.getElementById("titular").value.trim();

            const tarjeta =
                document.getElementById("tarjeta").value.trim();

            const fecha =
                document.getElementById("fecha").value.trim();

            const cvv =
                document.getElementById("cvv").value.trim();

            if (!titular || !tarjeta || !fecha || !cvv) {

                mensaje.className =
                    "bg-red-500/20 border border-red-500/40 mb-6 p-5 rounded-2xl text-center font-bold text-red-300";

                mensaje.textContent =
                    "Debes completar todos los datos de pago";

                mensaje.classList.remove("hidden");

                return;

            }

            try {

                checkoutButton.disabled = true;

                checkoutButton.textContent =
                    "Procesando pago...";

                mensaje.className =
                    "bg-cyan-500/20 border border-cyan-500/40 mb-6 p-5 rounded-2xl text-center font-bold text-cyan-300";

                mensaje.innerHTML = `
                
                    Procesando pago seguro...<br>
                    Conectando con la pasarela de pago...
                
                `;

                mensaje.classList.remove("hidden");

                const respuesta =
                    await fetch(API_CHECKOUT, {

                        method: "POST",

                        headers: {

                            "Authorization":
                                `Bearer ${token}`

                        }

                    });

                const data =
                    await respuesta.json();

                if (!respuesta.ok) {

                    throw new Error(
                        data.detail ||
                        "Error al procesar compra"
                    );

                }

                mensaje.className =
                    "bg-green-500/20 border border-green-500/40 mb-6 p-5 rounded-2xl text-center font-bold text-green-300";

                mensaje.innerHTML = `
                
                    ✅ Compra realizada correctamente<br><br>
                    Recibirás toda la información de tu pedido por correo electrónico.
                
                `;

                contadorCarrito.textContent = 0;

                carrito = [];

                mostrarCheckout(0);

                setTimeout(() => {

                    window.location.href =
                        "pedidos.html";

                }, 3000);

            } catch (error) {

                console.error(error);

                mensaje.className =
                    "bg-red-500/20 border border-red-500/40 mb-6 p-5 rounded-2xl text-center font-bold text-red-300";

                mensaje.textContent =
                    error.message;

                mensaje.classList.remove("hidden");

            } finally {

                checkoutButton.disabled = false;

                checkoutButton.textContent =
                    "Confirmar compra";

            }

        }

        cargarCarrito();

    </script>

</body>

</html>

<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Carrito | GameStore</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">

</head>

<body class="min-h-screen flex flex-col">

    <!-- =========================
         NAVBAR
    ========================== -->

    <nav class="navbar">

        <div class="container-custom">

            <a href="index.html"
                class="logo">

                GameStore

            </a>

            <ul class="nav-menu">

                <li>
                    <a href="index.html"
                        class="nav-link">
                        Inicio
                    </a>
                </li>

                <li>
                    <a href="catalogo.html"
                        class="nav-link">
                        Catálogo
                    </a>
                </li>

                <li>
                    <a href="pedidos.html"
                        class="nav-link">
                        Pedidos
                    </a>
                </li>

                <li>
                    <a href="perfil.html"
                        class="nav-link">
                        Perfil
                    </a>
                </li>

                <li>
                    <a href="carrito.html"
                        class="nav-active">

                        Carrito

                        <span id="contadorCarrito"
                            class="cart-badge">

                            0

                        </span>

                    </a>
                </li>

            </ul>

        </div>

    </nav>

    <!-- =========================
         HERO
    ========================== -->

    <section class="hero-section-small">

        <div class="container-custom text-center">

            <span class="hero-badge">

                TU CARRITO

            </span>

            <h1 class="hero-title mt-6">

                Tu colección pendiente

            </h1>

            <p class="hero-subtitle max-w-3xl mx-auto mt-6">

                Revisa tus videojuegos favoritos antes de completar tu compra.

            </p>

        </div>

    </section>

    <!-- =========================
         CONTENIDO
    ========================== -->

    <main class="flex-grow pb-24">

        <div class="container-custom">

            <div id="mensaje"
                class="hidden mb-8 p-5 rounded-2xl text-center font-bold">
            </div>

            <div id="contenedorCarrito">

            </div>

        </div>

    </main>

    <!-- =========================
         FOOTER
    ========================== -->

    <footer class="py-12">

        <div class="container-custom flex flex-col md:flex-row justify-between items-center gap-8">

            <div>

                <h3 class="logo mb-3">

                    GameStore

                </h3>

                <p class="text-slate-400">

                    Tu tienda online de videojuegos.

                </p>

            </div>

            <div class="flex gap-8 text-lg">

                <a href="https://www.instagram.com"
                    target="_blank"
                    class="footer-link">

                    Instagram

                </a>

                <a href="https://x.com"
                    target="_blank"
                    class="footer-link">

                    X

                </a>

                <a href="https://www.youtube.com"
                    target="_blank"
                    class="footer-link">

                    YouTube

                </a>

            </div>

        </div>

    </footer>

    <!-- =========================
         SCRIPT
    ========================== -->

    <script>

        const API_URL =
            "http://127.0.0.1:8000/cart";

        const contenedorCarrito =
            document.getElementById("contenedorCarrito");

        const contadorCarrito =
            document.getElementById("contadorCarrito");

        const mensaje =
            document.getElementById("mensaje");

        const token =
            localStorage.getItem("token");

        let carrito = [];

        if (!token) {

            alert("Debes iniciar sesión");

            window.location.href =
                "login.html";

        }

        async function cargarCarrito() {

            try {

                const respuesta =
                    await fetch(API_URL + "/", {

                        headers: {

                            "Authorization":
                                `Bearer ${token}`

                        }

                    });

                const data =
                    await respuesta.json();

                if (!respuesta.ok) {

                    throw new Error(
                        data.detail ||
                        "Error al cargar carrito"
                    );

                }

                carrito = data.items || [];

                contadorCarrito.textContent =
                    carrito.length;

                renderizarCarrito(data.total_price || 0);

            } catch (error) {

                console.error(error);

                mensaje.className =
                    "bg-red-500/20 border border-red-500/40 mb-8 p-5 rounded-2xl text-center font-bold text-red-300";

                mensaje.textContent =
                    error.message;

                mensaje.classList.remove("hidden");

            }

        }

        function renderizarCarrito(totalBackend) {

            contenedorCarrito.innerHTML = "";

            if (carrito.length === 0) {

                contenedorCarrito.innerHTML = `

                    <div class="game-card p-16 text-center max-w-4xl mx-auto">

                        <div class="text-8xl mb-8">

                            🛒

                        </div>

                        <h2 class="text-5xl font-black mb-6">

                            Tu carrito está vacío

                        </h2>

                        <p class="text-slate-400 text-2xl leading-relaxed mb-12 max-w-2xl mx-auto">

                            Explora nuestro catálogo y descubre nuevos videojuegos.

                        </p>

                        <a href="catalogo.html"
                            class="btn-primary text-2xl px-10 py-5 inline-block">

                            Ir al catálogo

                        </a>

                    </div>

                `;

                return;

            }

            let juegosHTML = "";

            carrito.forEach((item) => {

                const juego = item.game;

                juegosHTML += `

                    <div class="game-card p-8 flex flex-col lg:flex-row justify-between items-center gap-8">

                        <div>

                            <h2 class="text-3xl font-black mb-3">

                                ${juego.title}

                            </h2>

                            <p class="text-slate-400 text-lg mb-2">

                                🎮 ${juego.platform}

                            </p>

                            <p class="text-cyan-400 text-3xl font-black">

                                ${juego.price.toFixed(2)}€

                            </p>

                            <p class="text-slate-500 mt-2">

                                Cantidad: ${item.quantity}

                            </p>

                        </div>

                        <button
                            onclick="eliminarJuego(${juego.id})"
                            class="bg-red-500 hover:bg-red-600 transition px-6 py-4 rounded-2xl font-bold text-white">

                            Eliminar

                        </button>

                    </div>

                `;

            });

            contenedorCarrito.innerHTML = `

                <div class="space-y-8">

                    ${juegosHTML}

                    <div class="game-card p-10">

                        <div class="flex flex-col lg:flex-row justify-between items-center gap-8">

                            <div>

                                <p class="text-slate-400 text-xl mb-2">

                                    Total del pedido

                                </p>

                                <h2 class="text-6xl font-black text-cyan-400">

                                    ${totalBackend.toFixed(2)}€

                                </h2>

                            </div>

                            <button
                                onclick="finalizarCompra()"
                                class="btn-primary text-2xl px-10 py-5">

                                Finalizar compra

                            </button>

                        </div>

                    </div>

                </div>

            `;

        }

        async function eliminarJuego(gameId) {

            try {

                const respuesta =
                    await fetch(API_URL + "/remove/" + gameId, {

                        method: "DELETE",

                        headers: {

                            "Authorization":
                                `Bearer ${token}`

                        }

                    });

                const data =
                    await respuesta.json();

                if (!respuesta.ok) {

                    throw new Error(
                        data.detail ||
                        "Error al eliminar juego"
                    );

                }

                cargarCarrito();

            } catch (error) {

                console.error(error);

                mensaje.className =
                    "bg-red-500/20 border border-red-500/40 mb-8 p-5 rounded-2xl text-center font-bold text-red-300";

                mensaje.textContent =
                    error.message;

                mensaje.classList.remove("hidden");

            }

        }

        function finalizarCompra() {

            window.location.href =
                "checkout.html";

        }

        cargarCarrito();

    </script>

</body>

</html>

<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Carrito | GameStore</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-slate-900 text-white min-h-screen flex flex-col">

    <!-- =========================
         NAVBAR
    ========================== -->

    <nav class="bg-slate-800 p-4 shadow-xl">

        <div class="container mx-auto flex justify-between items-center">

            <h1 class="text-3xl font-bold text-blue-400">
                GameStore
            </h1>

            <ul class="flex gap-6 items-center">

                <li>

                    <a href="index.html"
                        class="hover:text-blue-400 transition">

                        Inicio

                    </a>

                </li>

                <li>

                    <a href="catalogo.html"
                        class="hover:text-blue-400 transition">

                        Catálogo

                    </a>

                </li>

                <li>

                    <a href="carrito.html"
                        class="text-blue-400 font-bold">

                        Carrito

                        <span id="contadorCarrito"
                            class="bg-blue-500 text-white px-2 py-1 rounded-full text-sm ml-1">

                            0

                        </span>

                    </a>

                </li>

            </ul>

        </div>

    </nav>

    <!-- =========================
         HEADER
    ========================== -->

    <section class="py-16 text-center px-6">

        <h1 class="text-6xl font-bold mb-6">

            Tu carrito

        </h1>

        <p class="text-gray-400 text-xl">

            Revisa tus videojuegos antes de finalizar la compra.

        </p>

    </section>

    <!-- =========================
         CONTENIDO
    ========================== -->

    <main class="container mx-auto px-6 pb-20 flex-grow">

        <div id="contenedorCarrito"
            class="space-y-6">

        </div>

        <!-- TOTAL -->

        <div id="resumenCompra"
            class="hidden bg-slate-800 p-8 rounded-3xl mt-10">

            <div class="flex justify-between items-center mb-6">

                <h2 class="text-3xl font-bold">

                    Total

                </h2>

                <span id="totalCompra"
                    class="text-4xl font-bold text-blue-400">

                    0€

                </span>

            </div>

            <div class="flex flex-col md:flex-row gap-4">

                <button onclick="vaciarCarrito()"
                    class="w-full bg-red-500 hover:bg-red-600 transition py-4 rounded-2xl text-xl font-bold">

                    Vaciar carrito

                </button>

                <a href="checkout.html"
                    class="w-full text-center bg-blue-500 hover:bg-blue-600 transition py-4 rounded-2xl text-xl font-bold">

                    Finalizar compra

                </a>

            </div>

        </div>

    </main>

    <!-- =========================
         FOOTER
    ========================== -->

    <footer class="bg-slate-800 py-10">

        <div
            class="container mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-6">

            <div>

                <h3 class="text-3xl font-bold text-blue-400 mb-2">

                    GameStore

                </h3>

                <p class="text-gray-400">

                    Tu tienda online de videojuegos.

                </p>

            </div>

            <div class="flex gap-6 text-lg">

                <a href="https://www.instagram.com"
                    target="_blank"
                    class="hover:text-blue-400 transition">

                    Instagram

                </a>

                <a href="https://x.com"
                    target="_blank"
                    class="hover:text-blue-400 transition">

                    X

                </a>

                <a href="https://www.youtube.com"
                    target="_blank"
                    class="hover:text-blue-400 transition">

                    YouTube

                </a>

            </div>

        </div>

    </footer>

    <!-- =========================
         SCRIPT
    ========================== -->

    <script>

        /* =========================
           ELEMENTOS
        ========================== */

        const contenedorCarrito =
            document.getElementById("contenedorCarrito");

        const totalCompra =
            document.getElementById("totalCompra");

        const resumenCompra =
            document.getElementById("resumenCompra");

        const contadorCarrito =
            document.getElementById("contadorCarrito");

        /* =========================
           CARRITO
        ========================== */

        let carrito =
            JSON.parse(localStorage.getItem("carrito")) || [];

        contadorCarrito.textContent =
            carrito.length;

        /* =========================
           IMÁGENES
        ========================== */

        const imagenes = {

            "Cyberpunk 2077":
                "assets/images/cyberpunk.jpg",

            "Elden Ring":
                "assets/images/elden_ring.jpg",

            "GTA V":
                "assets/images/gta_v.jpg",

            "Zelda TOTK":
                "assets/images/Zelda.jpg",

            "Red Dead Redemption 2":
                "assets/images/red_dead_2.jpg",

            "Hogwarts Legacy":
                "assets/images/Hogwarts.jpg",

            "The Witcher 3":
                "assets/images/the_witcher_3.jpg",

            "Spider-Man 2":
                "assets/images/spiderman_2.jpg",

            "God of War Ragnarök":
                "assets/images/god_of_war.jpg",

            "Minecraft":
                "assets/images/Minecraft.jpg",

            "Fortnite":
                "assets/images/Fortnite.jpg",

            "Call of Duty Black Ops 6":
                "assets/images/call_of_duty.jpg",

            "Mario Kart 8 Deluxe":
                "assets/images/mario_kart_8.jpg",

            "League of Legends":
                "assets/images/league_of_legends.jpg",

            "Valorant":
                "assets/images/Valorant.jpg",

            "EA Sports FC 26":
                "assets/images/ea_sports.jpg"

        };

        /* =========================
           MOSTRAR CARRITO
        ========================== */

        function mostrarCarrito() {

            contenedorCarrito.innerHTML = "";

            if (carrito.length === 0) {

                resumenCompra.classList.add("hidden");

                contenedorCarrito.innerHTML = `

                    <div class="bg-slate-800 p-12 rounded-3xl text-center">

                        <h2 class="text-4xl font-bold mb-4">

                            Tu carrito está vacío

                        </h2>

                        <p class="text-gray-400 text-xl mb-8">

                            Añade videojuegos para continuar.

                        </p>

                        <a href="catalogo.html"
                            class="bg-blue-500 hover:bg-blue-600 transition px-8 py-4 rounded-2xl text-xl font-bold">

                            Ir al catálogo

                        </a>

                    </div>

                `;

                return;

            }

            resumenCompra.classList.remove("hidden");

            let total = 0;

            carrito.forEach((juego, index) => {

                total += juego.precio;

                const imagen =
                    imagenes[juego.nombre] ||
                    "assets/images/default.jpg";

                contenedorCarrito.innerHTML += `

                    <div class="bg-slate-800 rounded-3xl p-6 flex flex-col md:flex-row gap-6 items-center">

                        <!-- IMAGEN -->

                        <img src="${imagen}"
                            class="w-full md:w-52 h-52 object-cover rounded-2xl">

                        <!-- INFO -->

                        <div class="flex-grow">

                            <h2 class="text-3xl font-bold mb-3">

                                ${juego.nombre}

                            </h2>

                            <p class="text-gray-400 text-xl mb-2">

                                ${juego.plataforma}

                            </p>

                            <p class="text-blue-400 text-3xl font-bold">

                                ${juego.precio.toFixed(2)}€

                            </p>

                        </div>

                        <!-- BOTÓN -->

                        <button
                            onclick="eliminarJuego(${index})"
                            class="bg-red-500 hover:bg-red-600 transition px-6 py-3 rounded-xl font-bold">

                            Eliminar

                        </button>

                    </div>

                `;

            });

            totalCompra.textContent =
                total.toFixed(2) + "€";

        }

        /* =========================
           ELIMINAR JUEGO
        ========================== */

        function eliminarJuego(index) {

            carrito.splice(index, 1);

            localStorage.setItem(
                "carrito",
                JSON.stringify(carrito)
            );

            contadorCarrito.textContent =
                carrito.length;

            mostrarCarrito();

        }

        /* =========================
           VACIAR CARRITO
        ========================== */

        function vaciarCarrito() {

            const confirmar =
                confirm("¿Vaciar carrito completo?");

            if (!confirmar) return;

            carrito = [];

            localStorage.setItem(
                "carrito",
                JSON.stringify(carrito)
            );

            contadorCarrito.textContent = 0;

            mostrarCarrito();

        }

        /* =========================
           INICIAR
        ========================== */

        mostrarCarrito();

    </script>

</body>

</html>

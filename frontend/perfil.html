<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Mi perfil | GameStore</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-slate-900 text-white min-h-screen flex flex-col">

    <!-- =========================
         NAVBAR
    ========================== -->

    <nav class="bg-slate-800 p-4 shadow-xl">

        <div class="container mx-auto flex justify-between items-center">

            <h1 class="text-3xl font-bold text-blue-400">

                GameStore

            </h1>

            <ul class="flex gap-6 items-center">

                <li>

                    <a href="index.html"
                        class="hover:text-blue-400 transition">

                        Inicio

                    </a>

                </li>

                <li>

                    <a href="catalogo.html"
                        class="hover:text-blue-400 transition">

                        Catálogo

                    </a>

                </li>

                <li>

                    <a href="pedidos.html"
                        class="hover:text-blue-400 transition">

                        Mis pedidos

                    </a>

                </li>

                <li>

                    <a href="perfil.html"
                        class="text-blue-400 font-bold">

                        Perfil

                    </a>

                </li>

            </ul>

        </div>

    </nav>

    <!-- =========================
         HEADER
    ========================== -->

    <section class="py-16 text-center px-6">

        <h1 class="text-6xl font-bold mb-6">

            Mi perfil

        </h1>

        <p class="text-gray-400 text-xl">

            Gestiona tu cuenta y tus compras.

        </p>

    </section>

    <!-- =========================
         CONTENIDO
    ========================== -->

    <main class="container mx-auto px-6 pb-20 flex-grow">

        <div
            class="max-w-4xl mx-auto bg-slate-800 rounded-3xl p-10 shadow-2xl">

            <!-- USER INFO -->

            <div class="flex flex-col md:flex-row items-center gap-8 mb-12">

                <!-- AVATAR -->

                <div
                    class="w-36 h-36 rounded-full bg-blue-500 flex items-center justify-center text-5xl font-bold">

                    <span id="avatarLetter">

                        U

                    </span>

                </div>

                <!-- INFO -->

                <div class="text-center md:text-left">

                    <h2 id="username"
                        class="text-5xl font-bold mb-4">

                        Usuario

                    </h2>

                    <p id="email"
                        class="text-gray-400 text-2xl">

                        email@email.com

                    </p>

                </div>

            </div>

            <!-- ACCIONES -->

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

                <!-- PEDIDOS -->

                <a href="pedidos.html"
                    class="bg-slate-700 hover:bg-slate-600 transition p-8 rounded-3xl">

                    <h3 class="text-3xl font-bold mb-4">

                        Mis pedidos

                    </h3>

                    <p class="text-gray-400 text-lg">

                        Consulta tu historial de compras.

                    </p>

                </a>

                <!-- CATALOGO -->

                <a href="catalogo.html"
                    class="bg-slate-700 hover:bg-slate-600 transition p-8 rounded-3xl">

                    <h3 class="text-3xl font-bold mb-4">

                        Seguir comprando

                    </h3>

                    <p class="text-gray-400 text-lg">

                        Explora nuevos videojuegos.

                    </p>

                </a>

            </div>

            <!-- LOGOUT -->

            <div class="mt-12">

                <button
                    onclick="cerrarSesion()"
                    class="w-full bg-red-500 hover:bg-red-600 transition py-5 rounded-2xl text-2xl font-bold">

                    Cerrar sesión

                </button>

            </div>

        </div>

    </main>

    <!-- =========================
         FOOTER
    ========================== -->

    <footer class="bg-slate-800 py-10">

        <div
            class="container mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-6">

            <div>

                <h3 class="text-3xl font-bold text-blue-400 mb-2">

                    GameStore

                </h3>

                <p class="text-gray-400">

                    Tu tienda online de videojuegos.

                </p>

            </div>

            <div class="flex gap-6 text-lg">

                <a href="https://www.instagram.com"
                    target="_blank"
                    class="hover:text-blue-400 transition">

                    Instagram

                </a>

                <a href="https://x.com"
                    target="_blank"
                    class="hover:text-blue-400 transition">

                    X

                </a>

                <a href="https://www.youtube.com"
                    target="_blank"
                    class="hover:text-blue-400 transition">

                    YouTube

                </a>

            </div>

        </div>

    </footer>

    <!-- =========================
         SCRIPT
    ========================== -->

    <script>

        /* =========================
           TOKEN
        ========================== */

        const token =
            localStorage.getItem("token");

        /* =========================
           VALIDAR LOGIN
        ========================== */

        if (!token) {

            alert("Debes iniciar sesión");

            window.location.href =
                "login.html";

        }

        /* =========================
           ELEMENTOS
        ========================== */

        const usernameElement =
            document.getElementById("username");

        const emailElement =
            document.getElementById("email");

        const avatarLetter =
            document.getElementById("avatarLetter");

        /* =========================
           DECODIFICAR JWT
        ========================== */

        function parseJwt(token) {

            try {

                return JSON.parse(
                    atob(token.split('.')[1])
                );

            } catch {

                return null;

            }

        }

        const usuario =
            parseJwt(token);

        /* =========================
           MOSTRAR DATOS
        ========================== */

        if (usuario) {

            const username =
                usuario.sub || "Usuario";

            usernameElement.textContent =
                username;

            emailElement.textContent =
                usuario.email || "Sin email";

            avatarLetter.textContent =
                username.charAt(0).toUpperCase();

        }

        /* =========================
           LOGOUT
        ========================== */

        function cerrarSesion() {

            const confirmar =
                confirm("¿Cerrar sesión?");

            if (!confirmar) return;

            localStorage.removeItem("token");

            localStorage.removeItem("carrito");

            window.location.href =
                "index.html";

        }

    </script>

</body>

</html>

<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Mis pedidos | GameStore</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-slate-900 text-white min-h-screen flex flex-col">

    <!-- =========================
         NAVBAR
    ========================== -->

    <nav class="bg-slate-800 p-4 shadow-xl">

        <div class="container mx-auto flex justify-between items-center">

            <h1 class="text-3xl font-bold text-blue-400">

                GameStore

            </h1>

            <ul class="flex gap-6 items-center">

                <li>

                    <a href="index.html"
                        class="hover:text-blue-400 transition">

                        Inicio

                    </a>

                </li>

                <li>

                    <a href="catalogo.html"
                        class="hover:text-blue-400 transition">

                        Catálogo

                    </a>

                </li>

                <li>

                    <a href="carrito.html"
                        class="hover:text-blue-400 transition">

                        Carrito

                    </a>

                </li>

                <li>

                    <a href="pedidos.html"
                        class="text-blue-400 font-bold">

                        Mis pedidos

                    </a>

                </li>

            </ul>

        </div>

    </nav>

    <!-- =========================
         HEADER
    ========================== -->

    <section class="py-16 text-center px-6">

        <h1 class="text-6xl font-bold mb-6">

            Historial de pedidos

        </h1>

        <p class="text-gray-400 text-xl">

            Consulta todas tus compras realizadas.

        </p>

    </section>

    <!-- =========================
         CONTENIDO
    ========================== -->

    <main class="container mx-auto px-6 pb-20 flex-grow">

        <!-- MENSAJE -->

        <div id="mensaje"
            class="hidden mb-8 p-4 rounded-xl text-center font-bold">

        </div>

        <!-- LISTA PEDIDOS -->

        <div id="listaPedidos"
            class="space-y-10">

        </div>

    </main>

    <!-- =========================
         FOOTER
    ========================== -->

    <footer class="bg-slate-800 py-10">

        <div
            class="container mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-6">

            <div>

                <h3 class="text-3xl font-bold text-blue-400 mb-2">

                    GameStore

                </h3>

                <p class="text-gray-400">

                    Tu tienda online de videojuegos.

                </p>

            </div>

            <div class="flex gap-6 text-lg">

                <a href="https://www.instagram.com"
                    target="_blank"
                    class="hover:text-blue-400 transition">

                    Instagram

                </a>

                <a href="https://x.com"
                    target="_blank"
                    class="hover:text-blue-400 transition">

                    X

                </a>

                <a href="https://www.youtube.com"
                    target="_blank"
                    class="hover:text-blue-400 transition">

                    YouTube

                </a>

            </div>

        </div>

    </footer>

    <!-- =========================
         SCRIPT
    ========================== -->

    <script>

        /* =========================
           API
        ========================== */

        const API_URL =
            "http://127.0.0.1:8000/orders/me";

        /* =========================
           ELEMENTOS
        ========================== */

        const listaPedidos =
            document.getElementById("listaPedidos");

        const mensaje =
            document.getElementById("mensaje");

        /* =========================
           TOKEN
        ========================== */

        const token =
            localStorage.getItem("token");

        /* =========================
           VALIDAR LOGIN
        ========================== */

        if (!token) {

            alert("Debes iniciar sesión");

            window.location.href =
                "login.html";

        }

        /* =========================
           CARGAR PEDIDOS
        ========================== */

        async function cargarPedidos() {

            try {

                const respuesta =
                    await fetch(API_URL, {

                        headers: {

                            "Authorization":
                                `Bearer ${token}`

                        }

                    });

                const pedidos =
                    await respuesta.json();

                /* =========================
                   ERROR API
                ========================== */

                if (!respuesta.ok) {

                    throw new Error(
                        pedidos.detail ||
                        "Error al cargar pedidos"
                    );

                }

                mostrarPedidos(pedidos);

            } catch (error) {

                console.error(error);

                mensaje.className =
                    "bg-red-500 mb-8 p-4 rounded-xl text-center font-bold";

                mensaje.textContent =
                    error.message;

                mensaje.classList.remove("hidden");

            }

        }

        /* =========================
           MOSTRAR PEDIDOS
        ========================== */

        function mostrarPedidos(pedidos) {

            listaPedidos.innerHTML = "";

            if (pedidos.length === 0) {

                listaPedidos.innerHTML = `

                    <div class="bg-slate-800 p-12 rounded-3xl text-center">

                        <h2 class="text-4xl font-bold mb-4">

                            No tienes pedidos

                        </h2>

                        <p class="text-gray-400 text-xl mb-8">

                            Realiza tu primera compra.

                        </p>

                        <a href="catalogo.html"
                            class="bg-blue-500 hover:bg-blue-600 transition px-8 py-4 rounded-2xl text-xl font-bold">

                            Ir al catálogo

                        </a>

                    </div>

                `;

                return;

            }

            pedidos.reverse();

            pedidos.forEach(pedido => {

                const fecha =
                    new Date(pedido.created_at)
                        .toLocaleDateString("es-ES");

                let juegosHTML = "";

                pedido.items.forEach(item => {

                    juegosHTML += `

                        <div class="bg-slate-700 p-4 rounded-xl flex justify-between items-center">

                            <div>

                                <h3 class="text-xl font-bold">

                                    ${item.game_title}

                                </h3>

                                <p class="text-gray-400">

                                    Cantidad:
                                    ${item.quantity}

                                </p>

                            </div>

                            <span class="text-blue-400 font-bold text-xl">

                                ${item.price_at_purchase.toFixed(2)}€

                            </span>

                        </div>

                    `;

                });

                listaPedidos.innerHTML += `

                    <div class="bg-slate-800 rounded-3xl p-8 shadow-xl">

                        <!-- HEADER -->

                        <div class="flex flex-col md:flex-row md:justify-between md:items-center gap-4 mb-8">

                            <div>

                                <h2 class="text-3xl font-bold">

                                    Pedido #${pedido.id}

                                </h2>

                                <p class="text-gray-400">

                                    Fecha:
                                    ${fecha}

                                </p>

                            </div>

                            <div class="flex gap-4 items-center">

                                <span class="bg-green-500 px-4 py-2 rounded-xl font-bold">

                                    ${pedido.status}

                                </span>

                                <span class="text-3xl font-bold text-blue-400">

                                    ${pedido.total_price.toFixed(2)}€

                                </span>

                            </div>

                        </div>

                        <!-- ITEMS -->

                        <div class="space-y-4">

                            ${juegosHTML}

                        </div>

                    </div>

                `;

            });

        }

        /* =========================
           INICIAR
        ========================== */

        cargarPedidos();

    </script>

</body>

</html>

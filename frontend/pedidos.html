<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Mis pedidos | GameStore</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">

</head>

<body class="min-h-screen flex flex-col">

    <!-- =========================
         NAVBAR
    ========================== -->

    <nav class="navbar p-4">

        <div class="container mx-auto flex justify-between items-center">

            <!-- LOGO -->

            <a href="index.html"
                class="logo">

                GameStore

            </a>

            <!-- MENÚ -->

            <ul class="flex gap-6 items-center flex-wrap">

                <li>

                    <a href="index.html"
                        class="nav-link">

                        Inicio

                    </a>

                </li>

                <li>

                    <a href="catalogo.html"
                        class="nav-link">

                        Catálogo

                    </a>

                </li>

                <li>

                    <a href="carrito.html"
                        class="nav-link">

                        Carrito

                        <span id="contadorCarrito"
                            class="bg-cyan-400 text-slate-950 px-2 py-1 rounded-full text-sm ml-1 font-bold">

                            0

                        </span>

                    </a>

                </li>

                <li>

                    <a href="pedidos.html"
                        class="nav-active">

                        Mis pedidos

                    </a>

                </li>

                <li>

                    <a href="perfil.html"
                        class="nav-link">

                        Perfil

                    </a>

                </li>

            </ul>

        </div>

    </nav>

    <!-- =========================
         HERO
    ========================== -->

    <section class="py-20 px-6 text-center fade-up">

        <div class="max-w-4xl mx-auto">

            <span class="badge mb-6 inline-block">

                Historial de compras

            </span>

            <h1 class="hero-title mb-6">

                Tus pedidos en
                <span class="gradient-text">
                    GameStore
                </span>

            </h1>

            <p class="hero-subtitle">

                Consulta todas tus compras realizadas y revisa el estado de tus pedidos.

            </p>

        </div>

    </section>

    <!-- =========================
         CONTENIDO
    ========================== -->

    <main class="container mx-auto px-6 pb-20 flex-grow">

        <!-- MENSAJE -->

        <div id="mensaje"
            class="hidden mb-8 p-5 rounded-2xl text-center font-bold">

        </div>

        <!-- LISTA PEDIDOS -->

        <div id="listaPedidos"
            class="space-y-10 max-w-6xl mx-auto">

        </div>

    </main>

    <!-- =========================
         FOOTER
    ========================== -->

    <footer class="footer">

        <div
            class="container mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-8">

            <div>

                <h3 class="logo mb-3">

                    GameStore

                </h3>

                <p class="text-slate-400">

                    Tu tienda online de videojuegos.

                </p>

            </div>

            <div class="flex gap-8 text-lg">

                <a href="https://www.instagram.com"
                    target="_blank"
                    class="footer-link">

                    Instagram

                </a>

                <a href="https://x.com"
                    target="_blank"
                    class="footer-link">

                    X

                </a>

                <a href="https://www.youtube.com"
                    target="_blank"
                    class="footer-link">

                    YouTube

                </a>

            </div>

        </div>

    </footer>

    <!-- =========================
         SCRIPT
    ========================== -->

    <script>

        /* =========================
           API
        ========================== */

        const API_URL =
            "http://127.0.0.1:8000/orders/me";

        /* =========================
           ELEMENTOS
        ========================== */

        const listaPedidos =
            document.getElementById("listaPedidos");

        const mensaje =
            document.getElementById("mensaje");

        const contadorCarrito =
            document.getElementById("contadorCarrito");

        /* =========================
           TOKEN
        ========================== */

        const token =
            localStorage.getItem("token");

        /* =========================
           CARRITO
        ========================== */

        const carrito =
            JSON.parse(localStorage.getItem("carrito")) || [];

        contadorCarrito.textContent =
            carrito.length;

        /* =========================
           VALIDAR LOGIN
        ========================== */

        if (!token) {

            alert("Debes iniciar sesión");

            window.location.href =
                "login.html";

        }

        /* =========================
           CARGAR PEDIDOS
        ========================== */

        async function cargarPedidos() {

            try {

                const respuesta =
                    await fetch(API_URL, {

                        headers: {

                            "Authorization":
                                `Bearer ${token}`

                        }

                    });

                const pedidos =
                    await respuesta.json();

                if (!respuesta.ok) {

                    throw new Error(
                        pedidos.detail ||
                        "Error al cargar pedidos"
                    );

                }

                mostrarPedidos(pedidos);

            } catch (error) {

                console.error(error);

                mensaje.className =
                    "bg-red-500/20 border border-red-500/40 mb-8 p-5 rounded-2xl text-center font-bold text-red-200";

                mensaje.textContent =
                    error.message;

                mensaje.classList.remove("hidden");

            }

        }

        /* =========================
           MOSTRAR PEDIDOS
        ========================== */

        function mostrarPedidos(pedidos) {

            listaPedidos.innerHTML = "";

            if (pedidos.length === 0) {

                listaPedidos.innerHTML = `

                    <div class="game-card p-14 rounded-[2rem] text-center">

                        <div class="max-w-2xl mx-auto">

                            <h2 class="text-5xl font-black mb-6">

                                No tienes pedidos

                            </h2>

                            <p class="text-slate-400 text-xl mb-10 leading-relaxed">

                                Todavía no has realizado ninguna compra en GameStore.

                            </p>

                            <a href="catalogo.html"
                                class="btn-primary inline-block text-xl px-10 py-5">

                                Explorar catálogo

                            </a>

                        </div>

                    </div>

                `;

                return;

            }

            pedidos.reverse();

            pedidos.forEach(pedido => {

                const fecha =
                    new Date(pedido.created_at)
                        .toLocaleDateString("es-ES");

                let juegosHTML = "";

                pedido.items.forEach(item => {

                    juegosHTML += `

                        <div class="bg-slate-900/70 border border-white/5 rounded-3xl p-6 flex flex-col md:flex-row justify-between items-center gap-5">

                            <div>

                                <h3 class="text-2xl font-black mb-2">

                                    ${item.game_title}

                                </h3>

                                <p class="text-slate-400">

                                    Cantidad:
                                    ${item.quantity}

                                </p>

                            </div>

                            <span class="text-cyan-400 text-3xl font-black">

                                ${item.price_at_purchase.toFixed(2)}€

                            </span>

                        </div>

                    `;

                });

                listaPedidos.innerHTML += `

                    <div class="game-card p-8 md:p-10 rounded-[2rem]">

                        <!-- HEADER -->

                        <div class="flex flex-col xl:flex-row xl:justify-between xl:items-center gap-8 mb-10">

                            <div>

                                <span class="badge mb-4 inline-block">

                                    Pedido #${pedido.id}

                                </span>

                                <h2 class="text-4xl md:text-5xl font-black mb-3">

                                    Pedido realizado

                                </h2>

                                <p class="text-slate-400 text-lg">

                                    Fecha:
                                    ${fecha}

                                </p>

                            </div>

                            <div class="flex flex-col items-start xl:items-end gap-4">

                                <span class="bg-emerald-500/20 border border-emerald-500/40 text-emerald-300 px-5 py-3 rounded-2xl font-bold">

                                    ${pedido.status}

                                </span>

                                <span class="text-5xl font-black gradient-text">

                                    ${pedido.total_price.toFixed(2)}€

                                </span>

                            </div>

                        </div>

                        <!-- ITEMS -->

                        <div class="space-y-5">

                            ${juegosHTML}

                        </div>

                    </div>

                `;

            });

        }

        /* =========================
           INICIAR
        ========================== */

        cargarPedidos();

    </script>

</body>

</html>
